version: '3.8'

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: task4
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-papp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    develop:
      watch: 
      - action: rebuild
        path: ./backend
        ignore:
          - ./backend/obj/
          - ./backend/bin/
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Server=mysql;Port=3306;Database=task4;User=app;Password=app;
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - ./frontend/node_modules:/app/node_modules
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          ignore:
            - ./frontend/node_modules/
            - ./frontend/dist/
    ports:
      - "8000:80"
    depends_on:
      - backend
      - phpmyadmin
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: app
      PMA_PASSWORD: app
      PMA_ABSOLUTE_URI: http://localhost:8000/phpmyadmin/
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
